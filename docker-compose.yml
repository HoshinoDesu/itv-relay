version: "3.8"

services:
  itv-relay:
    image: ghcr.io/hoshinodesu/itv-relay:latest
    container_name: itv-relay
    restart: unless-stopped
    ports:
      - "8088:8088"
    volumes:
      # 把宿主机 relay 目录挂载到容器 /data, 内含 config.toml 和频道清单 m3u
      - ./relay:/data
    environment:
      - RUST_LOG=itv_relay=info,state=info,ffmpeg=warn
    # tini 在镜像内作 ENTRYPOINT, 这里只覆盖 CMD 传配置路径
    command: ["itv-relay", "/data/config.toml"]
